validation:
  default_project: venho_hotel
  observe_samples: 1
  thresholds: { approve: 90, usable: 80, revise: 70, reject: 60 }
  rubric:
    match: 100
    partial: 60
    mismatch: 0
  kill_switch:
    forbidden_high_cap: 40
  image_validation_weights:
    dna_match: 0.30
    authenticity: 0.15
    composition: 0.10
    lighting: 0.10
    material: 0.10
    technical_quality: 0.05
    forbidden: 0.20
  prompt_validation_weights:
    dna_coverage: 0.35
    forbidden_conflict: 0.25
    clarity: 0.15
    token_efficiency: 0.10
    output_specificity: 0.10
    production_readiness: 0.05
  content_validation_weights:
    brand_fit: 0.25
    tone: 0.20
    clarity: 0.15
    cta: 0.15
    language_fit: 0.15
    production_readiness: 0.10
  face_validation:
    grounding: false
    rubric_file: config/projects/venho_hotel/face_qc_rubric.yaml
